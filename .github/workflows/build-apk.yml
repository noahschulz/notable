name: Build APK

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.1.0

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Prepare APK Output
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/notable-musnap.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notable-musnap-apk
          path: app/build/outputs/apk/debug/notable-musnap.apk
          if-no-files-found: error

      - name: Release Pre-built APK
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/notable-musnap.apk
          tag_name: musnap-latest
          name: Musnap Aura C Build
          prerelease: true
          make_latest: true
          body: |
            ### Notable Musnap Aura C Build
            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** `${{ github.sha }}`
          token: ${{ secrets.GITHUB_TOKEN }}
